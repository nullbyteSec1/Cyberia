<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ alert_mensagem }}</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:2rem;
            background:#0a0a0a;
            color:#c0c0c0;
            font-family:"Courier New","SF Mono",Monaco,monospace;
        }

        .alert-box{
            width:100%;
            max-width:620px;
            background:#0f0f0f;
            border:1px solid #2a2a2a;
        }

        header{
            padding:2rem;
            border-bottom:1px solid #2a2a2a;
            text-align:center;
        }

        .warning-icon{
            width:80px;
            height:80px;
            margin:0 auto 1.5rem;

            display:flex;
            align-items:center;
            justify-content:center;

            background:#050505;
            border:1px solid #2a2a2a;

            font-size:2.8rem;
            color:#d7d7d7;
        }

        h1{
            font-size:1.45rem;
            font-weight:normal;
            color:#e0e0e0;
            line-height:1.5;
        }

        main{
            padding:2rem;
            text-align:center;
        }

        .return{
            display:inline-block;
            padding:.75rem 1.4rem;
            background:#1a1a1a;
            border:1px solid #333;
            color:#c0c0c0;
            text-decoration:none;
            transition:.2s;
        }

        .return:hover{
            background:#222;
            border-color:#666;
            color:#e0e0e0;
        }

        footer{
            border-top:1px solid #2a2a2a;
            padding:1rem;
            text-align:center;
            color:#666;
            font-size:.8rem;
        }

        @media(max-width:700px){

            body{
                padding:1rem;
            }

            header,
            main{
                padding:1.5rem;
            }

            .warning-icon{
                width:70px;
                height:70px;
                font-size:2.4rem;
            }

            h1{
                font-size:1.2rem;
            }

        }
    </style>
</head>
<body>

    <div class="alert-box">

        <header>

            <div class="warning-icon">
                ⚠
            </div>

            <h1>{{ alert_mensagem }}</h1>

        </header>

        <main>

            <a class="return" href="{{ page_return }}">
                Return
            </a>

        </main>

        <footer>
            Cyberia Coffee
        </footer>

    </div>

</body>
</html>
