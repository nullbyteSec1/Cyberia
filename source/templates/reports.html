<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberia Coffee - Report</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            font-family:"Courier New","SF Mono",Monaco,monospace;
            background:#0a0a0a;
            color:#c0c0c0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            line-height:1.6;
            padding:2rem;
        }

        .report-box{
            width:100%;
            max-width:700px;
            background:#0f0f0f;
            border:1px solid #2a2a2a;
        }

        header{
            padding:2rem;
            border-bottom:1px solid #2a2a2a;
        }

        h1{
            font-size:1.5rem;
            font-weight:normal;
            color:#e0e0e0;
            margin-bottom:.5rem;
        }

        header p{
            color:#666;
            font-size:.85rem;
        }

        form{
            padding:2rem;
        }

        .field{
            margin-bottom:1.25rem;
        }

        label{
            display:block;
            color:#999;
            font-size:.8rem;
            margin-bottom:.5rem;
        }

        input,
        textarea{
            width:100%;
            background:#0a0a0a;
            border:1px solid #2a2a2a;
            color:#c0c0c0;
            font-family:inherit;
            font-size:.9rem;
            padding:.8rem;
        }

        input::placeholder,
        textarea::placeholder{
            color:#555;
        }

        input:focus,
        textarea:focus{
            outline:none;
            border-color:#666;
        }

        textarea{
            min-height:220px;
            resize:vertical;
        }

        button{
            width:100%;
            background:#1a1a1a;
            color:#c0c0c0;
            border:1px solid #333;
            padding:.8rem;
            font-family:inherit;
            font-size:.9rem;
            cursor:pointer;
            transition:.2s;
        }

        button:hover{
            background:#222;
            border-color:#666;
            color:#e0e0e0;
        }

        footer{
            border-top:1px solid #2a2a2a;
            padding:1rem 2rem;
            text-align:center;
            font-size:.75rem;
            color:#555;
        }

        a{
            color:#999;
            text-decoration:none;
        }

        a:hover{
            color:#e0e0e0;
        }

        @media (max-width:700px){

            body{
                padding:1rem;
            }

            header,
            form{
                padding:1.5rem;
            }

            textarea{
                min-height:180px;
            }

        }
    </style>
</head>
<body>

<main class="report-box">

    <header>
        <h1>Anonymous Report</h1>
        <p>Submit reports regarding rule violations, illegal content or moderation issues.</p>
    </header>

    <form method="POST" action="/reports">

        <div class="field">
            <label for="report_header">Title</label>
            <input
                id="report_header"
                name="report_header"
                type="text"
                maxlength="80"
                required
                placeholder="Brief description">
        </div>

        <div class="field">
            <label for="report_body">Details</label>
            <textarea
                id="report_body"
                name="report_body"
                required
                placeholder="Describe the issue. Include post IDs, board names or any information that may help the moderators."></textarea>
        </div>

        <button type="submit">Submit Report</button>

    </form>

    <footer>
        <a href="/">Return to board</a>
    </footer>

</main>

</body>
</html>
